services:
  - type: web
    name: drama-marketing-api
    env: python
    region: oregon
    plan: free
    branch: main
    buildCommand: cd api && pip install -r requirements.txt
    startCommand: cd api && gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: ALIYUN_API_KEY
        value: sk-52b66bbf97d9455ab5c65182adae57a5
      - key: PYTHON_VERSION
        value: 3.11.0
