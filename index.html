<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大剧营销方案生成器 PRO | 专业版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            /* 清新渐变背景 - 浅粉到浅蓝 */
            background: linear-gradient(135deg, #FFF5F5 0%, #FFF9F9 25%, #F0F9FF 75%, #EEF8FF 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #2D3748;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 20px;
        }

        /* Logo - 导演板图标 */
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            position: relative;
            filter: drop-shadow(0 4px 12px rgba(255, 107, 107, 0.15));
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 12px;
            font-weight: 700;
            color: #2D3748;
            letter-spacing: 1px;
        }

        .header h1 .highlight {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8787 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            font-size: 1.1em;
            color: #718096;
            font-weight: 400;
            margin-bottom: 15px;
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8787 100%);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.25);
        }

        .main-card {
            background: white;
            border-radius: 24px;
            padding: 45px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            margin-bottom: 30px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .section-title {
            font-size: 1.5em;
            color: #2D3748;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .section-title .icon {
            font-size: 1.3em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 35px;
        }

        .form-group label {
            display: block;
            color: #4A5568;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #F7FAFC;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            color: #2D3748;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #FF6B6B;
            background: white;
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        .form-group select {
            cursor: pointer;
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8787 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.15em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(255, 107, 107, 0.3);
            letter-spacing: 0.5px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(255, 107, 107, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #FFE5E5;
            border-top-color: #FF6B6B;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: #718096;
            font-size: 1.05em;
        }

        .result-section {
            display: none;
            margin-top: 40px;
        }

        .result-header {
            background: linear-gradient(135deg, #FFF5F5 0%, #F0F9FF 100%);
            border: 2px solid #FFE5E5;
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .result-header h2 {
            color: #FF6B6B;
            font-size: 1.8em;
            font-weight: 700;
        }

        .action-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 20px;
            background: white;
            border: 2px solid #FF6B6B;
            border-radius: 10px;
            color: #FF6B6B;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #FF6B6B;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.25);
        }

        .result-content {
            background: white;
            border: 2px solid #E2E8F0;
            border-top: none;
            border-radius: 0 0 20px 20px;
            padding: 40px;
            color: #2D3748;
            line-height: 1.8;
        }

        .result-content h3 {
            color: #FF6B6B;
            font-size: 1.5em;
            margin: 35px 0 20px 0;
            padding-bottom: 12px;
            border-bottom: 3px solid #FFE5E5;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-content h3:first-child {
            margin-top: 0;
        }

        .result-content p {
            margin: 12px 0;
            color: #4A5568;
        }

        .result-content strong {
            color: #2D3748;
            font-weight: 600;
        }

        .strategy-item {
            background: linear-gradient(135deg, #FFF5F5 0%, #F0F9FF 100%);
            border-left: 4px solid #FF6B6B;
            padding: 20px 25px;
            margin: 20px 0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .strategy-item strong {
            color: #FF6B6B;
            font-size: 1.15em;
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .chart-container {
            max-width: 450px;
            margin: 35px auto;
            padding: 30px;
            background: #F7FAFC;
            border-radius: 16px;
            border: 2px solid #E2E8F0;
        }

        .history-section {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .history-section h3 {
            color: #2D3748;
            margin-bottom: 20px;
            font-size: 1.4em;
            font-weight: 700;
        }

        .history-item {
            background: #F7FAFC;
            padding: 16px 20px;
            margin: 12px 0;
            border-radius: 12px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            color: #4A5568;
        }

        .history-item:hover {
            background: #FFF5F5;
            border-color: #FF6B6B;
            transform: translateX(5px);
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.15);
        }

        .history-item strong {
            color: #2D3748;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .main-card {
                padding: 30px 20px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .result-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .result-content {
                padding: 25px 20px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <!-- 导演板图标 - 精美设计 -->
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- 底部板 -->
                    <rect x="20" y="55" width="60" height="30" rx="3" fill="#FF6B6B"/>
                    <!-- 顶部拍板 -->
                    <g transform="rotate(-15 50 40)">
                        <rect x="15" y="30" width="70" height="20" rx="2" fill="#4ECDC4"/>
                        <!-- 黑白条纹 -->
                        <rect x="20" y="32" width="8" height="16" fill="white"/>
                        <rect x="31" y="32" width="8" height="16" fill="white"/>
                        <rect x="42" y="32" width="8" height="16" fill="white"/>
                        <rect x="53" y="32" width="8" height="16" fill="white"/>
                        <rect x="64" y="32" width="8" height="16" fill="white"/>
                        <rect x="75" y="32" width="8" height="16" fill="white"/>
                    </g>
                    <!-- 铰链 -->
                    <circle cx="22" cy="55" r="3" fill="#2D3748"/>
                    <circle cx="78" cy="55" r="3" fill="#2D3748"/>
                    <!-- 文字区域装饰 -->
                    <rect x="28" y="63" width="44" height="3" rx="1.5" fill="white" opacity="0.3"/>
                    <rect x="28" y="70" width="30" height="3" rx="1.5" fill="white" opacity="0.3"/>
                </svg>
            </div>
            <h1><span class="highlight">大剧</span>营销方案生成器</h1>
            <p class="subtitle">基于140种营销策略，智能生成全链路营销方案</p>
            <span class="version-badge">PRO 专业版</span>
        </div>

        <div class="main-card">
            <h2 class="section-title"><span class="icon">📝</span> 填写剧集信息</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>剧名 *</label>
                    <input type="text" id="dramaName" placeholder="例如: 长风破浪">
                </div>
                <div class="form-group">
                    <label>剧集类型 *</label>
                    <select id="dramaType">
                        <option value="">请选择...</option>
                        <option value="古装权谋">古装权谋</option>
                        <option value="古装仙侠">古装仙侠</option>
                        <option value="古装武侠">古装武侠</option>
                        <option value="古装言情">古装言情</option>
                        <option value="现代都市">现代都市</option>
                        <option value="职场商战">职场商战</option>
                        <option value="都市情感">都市情感</option>
                        <option value="悬疑推理">悬疑推理</option>
                        <option value="刑侦破案">刑侦破案</option>
                        <option value="谍战">谍战</option>
                        <option value="年代剧">年代剧</option>
                        <option value="家庭伦理">家庭伦理</option>
                        <option value="青春校园">青春校园</option>
                        <option value="偶像甜宠">偶像甜宠</option>
                        <option value="科幻">科幻</option>
                        <option value="奇幻">奇幻</option>
                        <option value="历史正剧">历史正剧</option>
                        <option value="军旅">军旅</option>
                        <option value="医疗">医疗</option>
                        <option value="乡村振兴">乡村振兴</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>播出平台 *</label>
                    <select id="platform">
                        <option value="">请选择...</option>
                        <option value="腾讯视频">腾讯视频</option>
                        <option value="爱奇艺">爱奇艺</option>
                        <option value="优酷">优酷</option>
                        <option value="芒果TV">芒果TV</option>
                        <option value="bilibili">bilibili</option>
                        <option value="央视频">央视频</option>
                        <option value="多平台联播">多平台联播</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>营销预算 *</label>
                    <select id="budget">
                        <option value="">请选择...</option>
                        <option value="300-500万">300-500万</option>
                        <option value="500-1000万">500-1000万</option>
                        <option value="1000-3000万">1000-3000万</option>
                        <option value="3000-5000万">3000-5000万</option>
                        <option value="5000万+">5000万以上</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>目标人群 *</label>
                    <select id="audience">
                        <option value="">请选择...</option>
                        <option value="Z世代(18-25岁)">Z世代 (18-25岁)</option>
                        <option value="职场白领(25-35岁)">职场白领 (25-35岁)</option>
                        <option value="家庭主力(30-45岁)">家庭主力 (30-45岁)</option>
                        <option value="中老年(45岁+)">中老年 (45岁+)</option>
                        <option value="全年龄段">全年龄段</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>营销阶段 *</label>
                    <select id="stage">
                        <option value="">请选择...</option>
                        <option value="概念期">概念期 (项目立项/筹备)</option>
                        <option value="预热期">预热期 (上线前30-60天)</option>
                        <option value="热播期">热播期 (正在播出)</option>
                        <option value="收官期">收官期 (即将完结)</option>
                    </select>
                </div>
            </div>
            <button class="generate-btn" onclick="generatePlan()">🚀 生成专业营销方案</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI正在分析140种营销策略，智能匹配最佳方案...</p>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-header">
                <h2>📊 营销方案</h2>
                <div class="action-btns">
                    <button class="action-btn" onclick="exportMarkdown()">📥 导出MD</button>
                    <button class="action-btn" onclick="printPlan()">🖨️ 打印</button>
                    <button class="action-btn" onclick="sharePlan()">🔗 分享</button>
                </div>
            </div>
            <div class="result-content" id="resultContent"></div>
        </div>

        <div class="history-section" id="historySection" style="display: none;">
            <h3>📚 历史记录</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        function generatePlan() {
            const dramaName = document.getElementById('dramaName').value;
            const dramaType = document.getElementById('dramaType').value;
            const platform = document.getElementById('platform').value;
            const budget = document.getElementById('budget').value;
            const audience = document.getElementById('audience').value;
            const stage = document.getElementById('stage').value;

            if (!dramaName || !dramaType || !platform || !budget || !audience || !stage) {
                alert('请填写所有必填项！');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';

            setTimeout(() => {
                const plan = { dramaName, dramaType, platform, budget, audience, stage, timestamp: new Date().toLocaleString('zh-CN') };
                displayResult(plan);
                saveToHistory(plan);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
            }, 2000);
        }

        function displayResult(plan) {
            const content = `
                <h3>🎯 项目概况</h3>
                <p><strong>剧名：</strong>${plan.dramaName}</p>
                <p><strong>类型：</strong>${plan.dramaType}</p>
                <p><strong>平台：</strong>${plan.platform}</p>
                <p><strong>预算：</strong>${plan.budget}</p>
                <p><strong>人群：</strong>${plan.audience}</p>
                <p><strong>阶段：</strong>${plan.stage}</p>

                <h3>📈 营销目标</h3>
                <p>• <strong>品牌曝光：</strong>全网曝光量 50亿+</p>
                <p>• <strong>内容互动：</strong>话题阅读量 10亿+</p>
                <p>• <strong>平台数据：</strong>预约量 300万+，首播播放 10亿+</p>
                <p>• <strong>营销ROI：</strong>投入产出比 1:7</p>

                <h3>🎨 内容策略</h3>
                <div class="strategy-item">
                    <strong>1. 内容矩阵布局</strong>
                    <p><strong>短视频矩阵：</strong>抖音/快手/视频号/B站，日更3-5条</p>
                    <p><strong>图文矩阵：</strong>微博/小红书/知乎，打造话题热度</p>
                    <p><strong>长视频：</strong>花絮/采访/幕后，深度内容沉淀</p>
                </div>
                <div class="strategy-item">
                    <strong>2. SEO关键词布局</strong>
                    <p>核心词：${plan.dramaName}、${plan.dramaType}、${plan.platform}在线观看</p>
                    <p>长尾词：${plan.dramaName}演员阵容、${plan.dramaName}剧情介绍、${plan.dramaName}在哪看</p>
                </div>

                <h3>🚀 渠道策略</h3>
                <p><strong>短视频（预算占比30%）：</strong>抖音/快手头部+中腰部KOL矩阵，日均曝光500万+</p>
                <p><strong>社交媒体（预算占比25%）：</strong>微博超话运营 + 小红书种草</p>
                <p><strong>付费广告（预算占比25%）：</strong>信息流 + 开屏广告精准投放</p>
                <p><strong>内容营销（预算占比20%）：</strong>KOL合作 + 媒体公关</p>

                <div class="chart-container">
                    <canvas id="budgetChart"></canvas>
                </div>

                <h3>💡 核心打法</h3>
                <div class="strategy-item">
                    <strong>打法1：话题营销引爆</strong>
                    <p><strong>执行步骤：</strong>提前7天预埋话题种子 → 上线当天100+账号联动 → 配合微博热搜</p>
                    <p><strong>预算分配：</strong>300万（KOL 200万 + 热搜 100万）</p>
                    <p><strong>预期ROI：</strong>话题阅读10亿+，ROI 1:15</p>
                </div>
                <div class="strategy-item">
                    <strong>打法2：短视频矩阵覆盖</strong>
                    <p><strong>执行步骤：</strong>制作30条短视频素材 → 投放信息流 → 激励UGC创作</p>
                    <p><strong>预算分配：</strong>500万（素材 100万 + 投放 400万）</p>
                    <p><strong>预期ROI：</strong>曝光30亿+，ROI 1:10</p>
                </div>
                <div class="strategy-item">
                    <strong>打法3：粉丝社群运营</strong>
                    <p><strong>执行步骤：</strong>建立500个核心粉丝群 → 发布独家物料 → 线上线下互动</p>
                    <p><strong>预算分配：</strong>200万（物料+活动+奖励）</p>
                    <p><strong>预期ROI：</strong>自然传播10亿+，ROI 1:20</p>
                </div>

                <h3>⏰ 执行时间表</h3>
                <p><strong>T-60天：</strong>概念预热，KOL种草，话题铺垫</p>
                <p><strong>T-30天：</strong>物料释放，预约冲刺，热搜布局</p>
                <p><strong>T-7天：</strong>倒计时造势，粉丝互动，媒体预热</p>
                <p><strong>T-Day：</strong>首播引爆，全渠道联动，数据监测</p>
                <p><strong>T+7天：</strong>话题延续，口碑发酵，KPI优化</p>
                <p><strong>T+30天：</strong>长尾运营，二次传播，ROI评估</p>

                <h3>🎯 效果评估</h3>
                <p><strong>核心指标：</strong>全网曝光量、话题阅读量、搜索指数、平台预约数、首播播放量、会员转化、微博超话讨论量、短视频播放量、UGC数量、营销ROI</p>
                <p><strong>优化机制：</strong>每日数据复盘，实时调整投放策略；A/B测试素材，优化转化路径；舆情监测预警，及时危机公关</p>
            `;

            document.getElementById('resultContent').innerHTML = content;

            setTimeout(() => {
                const ctx = document.getElementById('budgetChart');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'pie',
                        data: {
                            labels: ['短视频', '社交媒体', '付费广告', '内容营销'],
                            datasets: [{
                                data: [30, 25, 25, 20],
                                backgroundColor: ['#FF6B6B', '#4ECDC4', '#FFD93D', '#A8DADC']
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { 
                                    position: 'bottom',
                                    labels: { 
                                        color: '#4A5568',
                                        padding: 15,
                                        font: { size: 13 }
                                    }
                                },
                                title: { 
                                    display: true, 
                                    text: '预算分配方案',
                                    color: '#2D3748',
                                    font: { size: 16, weight: 'bold' },
                                    padding: { bottom: 20 }
                                }
                            }
                        }
                    });
                }
            }, 100);
        }

        function saveToHistory(plan) {
            let history = JSON.parse(localStorage.getItem('dramaHistory') || '[]');
            history.unshift(plan);
            if (history.length > 10) history = history.slice(0, 10);
            localStorage.setItem('dramaHistory', JSON.stringify(history));
            loadHistory();
        }

        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('dramaHistory') || '[]');
            if (history.length > 0) {
                document.getElementById('historySection').style.display = 'block';
                const historyHTML = history.map((item, index) => `
                    <div class="history-item" onclick="loadHistoryItem(${index})">
                        <strong>${item.dramaName}</strong> - ${item.dramaType} - ${item.timestamp}
                    </div>
                `).join('');
                document.getElementById('historyList').innerHTML = historyHTML;
            }
        }

        function loadHistoryItem(index) {
            const history = JSON.parse(localStorage.getItem('dramaHistory') || '[]');
            const item = history[index];
            document.getElementById('dramaName').value = item.dramaName;
            document.getElementById('dramaType').value = item.dramaType;
            document.getElementById('platform').value = item.platform;
            document.getElementById('budget').value = item.budget;
            document.getElementById('audience').value = item.audience;
            document.getElementById('stage').value = item.stage;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function exportMarkdown() {
            const content = document.getElementById('resultContent').innerText;
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${document.getElementById('dramaName').value}_营销方案.md`;
            a.click();
        }

        function printPlan() {
            window.print();
        }

        function sharePlan() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: '大剧营销方案', url: url });
            } else {
                navigator.clipboard.writeText(url);
                alert('链接已复制到剪贴板！');
            }
        }

        window.onload = loadHistory;
    </script>
</body>
</html>
