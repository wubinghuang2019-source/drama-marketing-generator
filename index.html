<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大剧营销方案生成器 PRO v2.0 | AI定制版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(221, 118, 148, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(83, 183, 111, 0.25) 0%, transparent 50%),
                linear-gradient(180deg, 
                    #FFF8FA 0%, 
                    #FFF5F7 20%,
                    #F8FBF9 50%,
                    #F0F9F3 80%,
                    #EBF7EE 100%
                );
            min-height: 100vh;
            padding: 30px 20px;
            color: #262626;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(221, 118, 148, 0.12) 0%, transparent 25%),
                radial-gradient(circle at 85% 75%, rgba(83, 183, 111, 0.12) 0%, transparent 25%),
                radial-gradient(circle at 50% 50%, rgba(221, 118, 148, 0.06) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 20px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            filter: drop-shadow(0 2px 12px rgba(221, 118, 148, 0.35)) drop-shadow(0 2px 20px rgba(83, 183, 111, 0.25));
            animation: logoFloat 4s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0) scale(1);
                filter: drop-shadow(0 2px 12px rgba(221, 118, 148, 0.35)) drop-shadow(0 2px 20px rgba(83, 183, 111, 0.25));
            }
            50% {
                transform: translateY(-5px) scale(1.03);
                filter: drop-shadow(0 5px 18px rgba(221, 118, 148, 0.5)) drop-shadow(0 5px 28px rgba(83, 183, 111, 0.4));
            }
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        .header h1 {
            font-size: 2.8em;
            font-weight: 800;
            color: #262626;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .header h1 .highlight {
            background: linear-gradient(135deg, #53B76F 0%, #3D9F5A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, #DD7694 0%, #C9627D 100%);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(221, 118, 148, 0.25);
            margin-left: 10px;
        }

        .header p {
            font-size: 1.1em;
            color: #595959;
            margin-top: 15px;
            line-height: 1.8;
        }

        .form-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            border: 1px solid #F0F0F0;
        }

        .form-section h2 {
            color: #262626;
            font-size: 1.6em;
            margin-bottom: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-weight: 600;
            color: #262626;
            margin-bottom: 10px;
            font-size: 1.05em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 16px 20px;
            border: 2px solid #E8E8E8;
            border-radius: 12px;
            font-size: 1.05em;
            transition: all 0.3s ease;
            background: #FAFAFA;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #53B76F;
            background: white;
            box-shadow: 0 0 0 3px rgba(83, 183, 111, 0.1);
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #53B76F 0%, #3D9F5A 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.15em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(83, 183, 111, 0.3);
            letter-spacing: 0.5px;
            margin-top: 30px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(83, 183, 111, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
            margin: 30px 0;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #E6F4EB;
            border-top-color: #53B76F;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: #595959;
            font-size: 1.1em;
        }

        .result-section {
            display: none;
            background: white;
            border-radius: 20px;
            margin-top: 30px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .result-header {
            background: linear-gradient(135deg, 
                rgba(221, 118, 148, 0.12) 0%, 
                rgba(83, 183, 111, 0.12) 100%
            );
            border: 2px solid rgba(83, 183, 111, 0.3);
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .result-header h2 {
            color: #53B76F;
            font-size: 1.8em;
            font-weight: 700;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 20px;
            background: white;
            border: 2px solid #53B76F;
            border-radius: 10px;
            color: #53B76F;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #53B76F;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(83, 183, 111, 0.25);
        }

        .result-content {
            padding: 40px;
            line-height: 1.8;
        }

        .result-content h3 {
            color: #53B76F;
            font-size: 1.5em;
            margin: 35px 0 20px 0;
            padding-bottom: 12px;
            border-bottom: 3px solid rgba(221, 118, 148, 0.3);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-content p {
            margin: 12px 0;
            color: #595959;
        }

        .result-content strong {
            color: #262626;
            font-weight: 600;
        }

        /* 表格样式 */
        .result-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .result-content table thead {
            background: linear-gradient(135deg, #53B76F 0%, #48A965 100%);
        }

        .result-content table thead th {
            color: #fff;
            font-weight: 600;
            padding: 15px;
            text-align: left;
            font-size: 14px;
        }

        .result-content table tbody tr {
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .result-content table tbody tr:hover {
            background: rgba(83, 183, 111, 0.05);
        }

        .result-content table tbody tr:last-child {
            border-bottom: none;
        }

        .result-content table tbody td {
            padding: 12px 15px;
            color: #595959;
            font-size: 14px;
        }

        .result-content table tbody td:first-child {
            font-weight: 600;
            color: #262626;
        }

        /* 章节操作按钮样式 */
        .section-control-btn {
            padding: 4px 10px;
            font-size: 12px;
            border: 1px solid #d9d9d9;
            background: #fff;
            color: #595959;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .section-control-btn:hover {
            border-color: #53B76F;
            color: #53B76F;
            background: rgba(83, 183, 111, 0.05);
        }

        .section-control-btn-danger:hover {
            border-color: #e74c3c;
            color: #e74c3c;
            background: rgba(231, 76, 60, 0.05);
        }

        /* 编辑模式样式 */
        .section-editing {
            background: #fffbe6;
            padding: 20px;
            border-radius: 8px;
            border: 2px dashed #ffd666;
        }

        .section-editing textarea {
            width: 100%;
            min-height: 200px;
            padding: 12px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            line-height: 1.6;
            resize: vertical;
        }

        .strategy-item {
            background: linear-gradient(135deg, 
                rgba(221, 118, 148, 0.08) 0%, 
                rgba(83, 183, 111, 0.08) 100%
            );
            border-left: 4px solid #53B76F;
            padding: 20px 25px;
            margin: 20px 0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .strategy-item strong {
            color: #53B76F;
            font-size: 1.15em;
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .insight-card {
            background: linear-gradient(135deg, #FFF8FA 0%, #F8FBF9 100%);
            border: 2px solid rgba(221, 118, 148, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
        }

        .insight-card h4 {
            color: #DD7694;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .copywriting-item {
            background: white;
            border: 2px solid #E8E8E8;
            border-radius: 10px;
            padding: 15px 20px;
            margin: 12px 0;
            transition: all 0.3s ease;
        }

        .copywriting-item:hover {
            border-color: #53B76F;
            box-shadow: 0 2px 8px rgba(83, 183, 111, 0.15);
        }

        .copywriting-item .label {
            color: #DD7694;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .copywriting-item .text {
            color: #262626;
            font-size: 1.05em;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .form-section {
                padding: 25px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .result-content {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- 底座 - 带颜色呼吸 -->
                    <rect x="20" y="55" width="60" height="30" rx="3" fill="#53B76F">
                        <animate attributeName="fill" values="#53B76F;#62c47f;#53B76F" dur="2.5s" repeatCount="indefinite"/>
                    </rect>
                    
                    <!-- 导演板主体 - 带轻微晃动 -->
                    <g transform="rotate(-15 50 40)">
                        <animateTransform 
                            attributeName="transform" 
                            type="rotate" 
                            values="-15 50 40;-13 50 40;-15 50 40" 
                            dur="4s" 
                            repeatCount="indefinite"/>
                        
                        <rect x="15" y="30" width="70" height="20" rx="2" fill="#DD7694">
                            <animate attributeName="fill" values="#DD7694;#e886a4;#DD7694" dur="2.5s" repeatCount="indefinite"/>
                        </rect>
                        
                        <!-- 黑白条纹 - 波浪闪烁 -->
                        <rect x="20" y="32" width="8" height="16" fill="white">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="0s"/>
                        </rect>
                        <rect x="31" y="32" width="8" height="16" fill="white">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="0.3s"/>
                        </rect>
                        <rect x="42" y="32" width="8" height="16" fill="white">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="0.6s"/>
                        </rect>
                        <rect x="53" y="32" width="8" height="16" fill="white">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="0.9s"/>
                        </rect>
                        <rect x="64" y="32" width="8" height="16" fill="white">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="1.2s"/>
                        </rect>
                        <rect x="75" y="32" width="8" height="16" fill="white">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="1.5s"/>
                        </rect>
                    </g>
                    
                    <!-- 螺丝钉 - 轻微脉冲 -->
                    <circle cx="22" cy="55" r="3" fill="#262626">
                        <animate attributeName="r" values="3;3.3;3" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="78" cy="55" r="3" fill="#262626">
                        <animate attributeName="r" values="3;3.3;3" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    
                    <!-- 底座纹理 - 呼吸 -->
                    <rect x="28" y="63" width="44" height="3" rx="1.5" fill="white" opacity="0.3">
                        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
                    </rect>
                    <rect x="28" y="70" width="30" height="3" rx="1.5" fill="white" opacity="0.3">
                        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
                    </rect>
                    
                    <!-- 装饰星星 - 柔和闪烁 -->
                    <circle cx="15" cy="22" r="2" fill="#DD7694" opacity="0.7">
                        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
                        <animate attributeName="r" values="2;2.3;2" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="85" cy="25" r="1.8" fill="#53B76F" opacity="0.6">
                        <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.3s" repeatCount="indefinite"/>
                        <animate attributeName="r" values="1.8;2.1;1.8" dur="2.3s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="13" cy="80" r="1.6" fill="#DD7694" opacity="0.65">
                        <animate attributeName="opacity" values="0.65;0.15;0.65" dur="2.5s" repeatCount="indefinite"/>
                        <animate attributeName="r" values="1.6;1.9;1.6" dur="2.5s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="87" cy="82" r="1.9" fill="#53B76F" opacity="0.7">
                        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.2s" repeatCount="indefinite"/>
                        <animate attributeName="r" values="1.9;2.2;1.9" dur="2.2s" repeatCount="indefinite"/>
                    </circle>
                </svg>
            </div>
            <h1><span class="highlight">大剧营销方案生成器</span> PRO <span class="version-badge">v2.0 AI定制版</span></h1>
            <p>基于智能规则引擎，结合剧集内容深度定制营销策略<br>输出用户洞察、策略文案、平台玩法，真正可落地执行的专业方案</p>
        </div>

        <div class="form-section">
            <h2>📝 剧集信息填写</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>剧集名称 *</label>
                    <input type="text" id="dramaName" placeholder="例如: 庆余年2">
                </div>
                <div class="form-group">
                    <label>类型定位 *</label>
                    <select id="dramaType">
                        <option value="">请选择...</option>
                        <option value="古装剧">古装剧</option>
                        <option value="现代都市剧">现代都市剧</option>
                        <option value="悬疑推理剧">悬疑推理剧</option>
                        <option value="爱情剧">爱情剧</option>
                        <option value="家庭伦理剧">家庭伦理剧</option>
                        <option value="职场剧">职场剧</option>
                        <option value="青春校园剧">青春校园剧</option>
                        <option value="科幻剧">科幻剧</option>
                        <option value="历史剧">历史剧</option>
                        <option value="军旅剧">军旅剧</option>
                        <option value="医疗剧">医疗剧</option>
                        <option value="律政剧">律政剧</option>
                        <option value="谍战剧">谍战剧</option>
                        <option value="年代剧">年代剧</option>
                        <option value="喜剧">喜剧</option>
                        <option value="农村剧">农村剧</option>
                        <option value="主旋律剧">主旋律剧</option>
                        <option value="奇幻剧">奇幻剧</option>
                        <option value="武侠剧">武侠剧</option>
                        <option value="短剧">短剧</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>核心卖点 *</label>
                    <input type="text" id="coreSelling" placeholder="例如: 顶级流量+大IP改编+权谋爽剧+特效震撼">
                </div>
                <div class="form-group full-width">
                    <label>剧情梗概（简述故事主线和核心冲突）*</label>
                    <textarea id="plotSummary" placeholder="例如: 讲述现代青年穿越到古代权谋世界，从底层逆袭成为一代权臣的故事。核心冲突：个人理想vs家族利益，现代思维vs古代规则。"></textarea>
                </div>
                <div class="form-group">
                    <label>情感核心 *</label>
                    <select id="emotionCore">
                        <option value="">请选择...</option>
                        <option value="热血励志（逆袭成长）">热血励志（逆袭成长）</option>
                        <option value="浪漫甜蜜（恋爱糖分）">浪漫甜蜜（恋爱糖分）</option>
                        <option value="虐心催泪（情感冲击）">虐心催泪（情感冲击）</option>
                        <option value="爽感刺激（打脸反转）">爽感刺激（打脸反转）</option>
                        <option value="温情治愈（情感共鸣）">温情治愈（情感共鸣）</option>
                        <option value="紧张悬疑（烧脑推理）">紧张悬疑（烧脑推理）</option>
                        <option value="幽默搞笑（轻松解压）">幽默搞笑（轻松解压）</option>
                        <option value="家国情怀（价值认同）">家国情怀（价值认同）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>目标情绪（想让观众产生的感受）*</label>
                    <select id="targetEmotion">
                        <option value="">请选择...</option>
                        <option value="热血沸腾（想奋斗）">热血沸腾（想奋斗）</option>
                        <option value="甜蜜上头（想恋爱）">甜蜜上头（想恋爱）</option>
                        <option value="泪流满面（共情落泪）">泪流满面（共情落泪）</option>
                        <option value="畅快淋漓（爽感满足）">畅快淋漓（爽感满足）</option>
                        <option value="温暖感动（心灵治愈）">温暖感动（心灵治愈）</option>
                        <option value="紧张刺激（想追剧）">紧张刺激（想追剧）</option>
                        <option value="放松欢乐（解压娱乐）">放松欢乐（解压娱乐）</option>
                        <option value="思考共鸣（价值认同）">思考共鸣（价值认同）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>演员阵容 *</label>
                    <select id="castType">
                        <option value="">请选择...</option>
                        <option value="顶级流量明星（粉丝5000万+）">顶级流量明星（粉丝5000万+）</option>
                        <option value="一线实力派（演技+口碑）">一线实力派（演技+口碑）</option>

        // 显示验证错误弹窗
        function showValidationDialog(validation) {
            const errors = validation.errors || [];

            let errorHtml = '<div style="background:white;border-radius:16px;padding:30px;max-width:600px;margin:20px;box-shadow:0 8px 32px rgba(0,0,0,0.15);">';
            errorHtml += '<h3 style="color:#DD7694;margin-bottom:20px;font-size:1.5em;">⚠️ 检测到可能的错误</h3>';
            errorHtml += '<div style="margin-bottom:25px;color:#666;line-height:1.6;">为确保生成方案的准确性,请确认以下信息:</div>';
            
            errors.forEach((err, index) => {
                errorHtml += `<div style="background:#F8F9FA;padding:20px;border-radius:12px;margin-bottom:15px;border-left:4px solid #DD7694;">`;
                errorHtml += `<p style="margin:0 0 10px 0;font-weight:600;color:#262626;">字段: ${err.field}</p>`;
                errorHtml += `<p style="margin:5px 0;color:#666;"><span style="color:#999;">你填写的:</span> <span style="background:#FFE5EC;padding:2px 8px;border-radius:4px;">${err.userValue}</span></p>`;
                errorHtml += `<p style="margin:5px 0;color:#666;"><span style="color:#999;">建议更正为:</span> <span style="background:#E6F4EB;padding:2px 8px;border-radius:4px;color:#53B76F;font-weight:600;">${err.correctValue}</span></p>`;
                errorHtml += `<p style="margin:10px 0 0 0;font-size:0.9em;color:#888;">${err.reason}</p>`;
                errorHtml += `</div>`;

            errorHtml += '<div style="display:flex;gap:15px;margin-top:25px;">';
            errorHtml += '<button onclick="useCorrectInfo()" style="flex:1;padding:14px;background:linear-gradient(135deg,#53B76F,#3D9F5A);color:white;border:none;border-radius:12px;font-size:1em;font-weight:600;cursor:pointer;">使用正确信息</button>';
            errorHtml += '<button onclick="keepMyInfo()" style="flex:1;padding:14px;background:white;color:#53B76F;border:2px solid #53B76F;border-radius:12px;font-size:1em;font-weight:600;cursor:pointer;">保留我的填写</button>';
            errorHtml += '</div>';

            // 保存验证结果供后续使用
            window.validationResult = validation;
        }

            const validation = window.validationResult;

                    if (err.field === '演员' || err.field === '演员阵容') {
                        document.getElementById('castType').value = err.correctValue;
                    }
                    if (err.field === '剧情' || err.field === '剧情概述') {
                        document.getElementById('plotSummary').value = err.correctValue;
                    }
                });
            }
            document.getElementById('validationOverlay').remove();
            setTimeout(() => generatePlanAfterValidation(), 300);
        }

        async function generatePlanAfterValidation() {
            const dramaName = document.getElementById('dramaName').value;
            const dramaType = document.getElementById('dramaType').value;
            const platform = document.getElementById('platform').value;
            const budget = document.getElementById('budget').value;
            const audience = document.getElementById('audience').value;
            const stage = document.getElementById('stage').value;
            const coreSelling = document.getElementById('coreSelling').value;
            const plotSummary = document.getElementById('plotSummary').value;
            const emotionCore = document.getElementById('emotionCore').value;
            const targetEmotion = document.getElementById('targetEmotion').value;
            const castType = document.getElementById('castType').value;
            const ipType = document.getElementById('ipType').value;

            // 显示加载状态和结果区域（实时显示）
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultContent').innerHTML = '<p style="color:#888;">🚀 AI 正在生成方案，请稍候...</p>';
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });

            try {
                // 智能检测后端地址
                const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:'
                    ? 'http://localhost:3000'
                    : (window.BACKEND_URL || 'https://drama-marketing-api.onrender.com');

                // 创建超时控制器
                currentController = new AbortController();
                const timeoutId = setTimeout(() => {
                    if (currentController) {
                        currentController.abort();
                        console.log('请求超时，已取消');
                    }
                }, 180000); // 180秒超时

                // 调用AI后端生成营销方案（流式响应）
                const response = await fetch(`${API_BASE_URL}/api/generate-marketing-plan`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        dramaInfo: {
                            dramaName, dramaType, platform, budget, audience, stage,
                            coreSelling, plotSummary, emotionCore, targetEmotion, actors: castType, uniquePoint: ipType
                        },
                        planType: 'general'
                    }),
                    signal: currentController.signal
                }).finally(() => {
                    clearTimeout(timeoutId);
                    currentController = null;
                });

                if (!response.ok) {
                    throw new Error('后端服务暂时不可用，请稍后重试');
                }

                // 读取流式响应
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = '';
                let lastUpdateTime = Date.now();
                const readTimeout = 60000; // 60秒读取超时

                while (true) {
                    // 检查读取超时
                    if (Date.now() - lastUpdateTime > readTimeout) {
                        throw new Error('数据接收超时，请重试');
                    }

                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    lastUpdateTime = Date.now(); // 更新最后接收时间
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                                }

                    errorMsg = '🌐 网络连接失败\n\n可能原因：\n• 后端服务未启动\n• 网络连接中断\n• 防火墙阻止\n\n💡 建议：\n• 检查网络连接\n• 刷新页面重试\n• 联系管理员';

        // 实时更新结果预览

        // 获取章节内容(从H2到下一个H2之间的所有内容)
        function getSectionContent(h2Element) {

        // 1. 编辑章节
        function editSection(sectionId, h2Element) {
            console.log(`编辑章节: ${sectionId}`);
            
            // 获取章节标题(去除按钮部分)
            const sectionTitle = h2Element.childNodes[0].textContent.trim();
            
            // 获取章节的所有内容元素(从H2到下一个H2之间)
            const sectionElements = [];
            let currentElement = h2Element.nextElementSibling;
            
            while (currentElement && currentElement.tagName !== 'H2') {
                sectionElements.push(currentElement);
                currentElement = currentElement.nextElementSibling;
            }
            
            // 获取完整的Markdown内容(从outerHTML转回Markdown,简化处理)
            let markdownContent = `## ${sectionTitle}\n\n`;
            sectionElements.forEach(el => {
                markdownContent += el.innerText + '\n\n';
            });
            
            // 创建编辑容器
            const editContainer = document.createElement('div');
            editContainer.className = 'section-editing';
            editContainer.setAttribute('data-editing-section', sectionId);
            editContainer.innerHTML = `
                <h3 style="margin-top:0; color: #53B76F;">✏️ 编辑章节: ${sectionTitle}</h3>

                <textarea id="edit-textarea-${sectionId}" style="width: 100%; min-height: 300px; padding: 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-family: monospace; font-size: 13px; line-height: 1.6;">${markdownContent}</textarea>

                </div>
            `;
            
            // 先插入编辑器到H2后面
            h2Element.insertAdjacentElement('afterend', editContainer);
            
            // 然后隐藏H2和内容元素
            h2Element.style.display = 'none';
            sectionElements.forEach(el => el.style.display = 'none');
            
            // 滚动到编辑器
            editContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });

        // 保存编辑
        window.saveSectionEdit = function(sectionId) {
            const textarea = document.getElementById(`edit-textarea-${sectionId}`);
            const newMarkdown = textarea.value;
            const editContainer = document.querySelector(`[data-editing-section="${sectionId}"]`);
            const h2 = document.querySelector(`[data-section-id="${sectionId}"]`);
            
            // 使用marked.js渲染新Markdown
            const newHTML = marked.parse(newMarkdown);
            
            // 删除旧的内容元素(H2之后到下一个H2之前的所有元素)
            let currentElement = h2.nextElementSibling;
            while (currentElement && currentElement.tagName !== 'H2') {
                const next = currentElement.nextElementSibling;
                if (currentElement !== editContainer) {
                    currentElement.remove();
                }
                currentElement = next;
            }
            
            // 插入新内容
            editContainer.insertAdjacentHTML('beforebegin', newHTML);
            
            // 移除编辑器
            editContainer.remove();
            
            // 显示H2
            h2.style.display = '';
            
            // 更新window.currentPlan
            updateCurrentPlanFromDOM();
            
            // 重新添加控制按钮
            addSectionControls();
            
            alert('✅ 章节已更新!');

            // 显示H2
            h2.style.display = '';

            let currentElement = h2.nextElementSibling;
            while (currentElement && currentElement.tagName !== 'H2') {
                if (currentElement !== editContainer) {
                    currentElement.style.display = '';

        // 2. 重新生成章节
        async function regenerateSection(sectionId, h2Element) {
            const sectionTitle = h2Element.textContent.split('\n')[0].trim().replace(/^##\s*/, '');
            
            if (!confirm(`确定要重新生成章节"${sectionTitle}"吗?\n\n将根据全局上下文生成新内容,保持与其他章节的一致性。`)) {
                return;
            }
            
            console.log(`重新生成章节: ${sectionTitle}`);
            
            // 显示加载状态
            const loadingDiv = document.createElement('div');
            loadingDiv.style.cssText = 'padding: 20px; text-align: center; background: #f0f9f3; border-radius: 8px; margin: 10px 0;';
            loadingDiv.innerHTML = `<p>🔄 正在重新生成章节"${sectionTitle}"...<br><span style="font-size:12px;color:#999;">根据全局上下文生成中，请稍候</span></p>`;
            h2Element.insertAdjacentElement('afterend', loadingDiv);
            
            try {
                // 获取全局上下文(完整方案的前2000字符)
                const fullPlanContext = window.currentPlan.aiResult;
                
                // 调用重新生成接口
                const response = await fetch(`${API_BASE_URL}/api/regenerate-section`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        dramaInfo: {
                            dramaName: window.currentPlan.dramaName,
                            dramaType: window.currentPlan.dramaType,
                            audience: window.currentPlan.audience
                        },
                        sectionTitle: sectionTitle,
                        fullPlanContext: fullPlanContext
                    })
                });
                
                if (!response.ok) throw new Error('生成失败');
                
                // 流式读取
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let newSectionContent = '';
                
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    
                    for (let line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6);
                            if (data === '[DONE]') break;
                            
                            try {
                                const parsed = JSON.parse(data);
                                if (parsed.content) {
                                    newSectionContent += parsed.content;
                                    loadingDiv.innerHTML = `<p>🔄 生成中... (${newSectionContent.length}字)</p>`;
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                // 替换章节内容
                loadingDiv.remove();
                
                // 删除旧内容
                let oldElement = h2Element.nextElementSibling;
                while (oldElement && oldElement.tagName !== 'H2') {
                    const next = oldElement.nextElementSibling;
                    oldElement.remove();
                    oldElement = next;
                }
                
                // 插入新内容
                const newHTML = marked.parse(newSectionContent);
                h2Element.insertAdjacentHTML('afterend', newHTML);
                
                // 更新window.currentPlan
                updateCurrentPlanFromDOM();
                
                // 重新添加控制按钮
                addSectionControls();
                
                alert('✅ 章节已重新生成!');
                
            } catch (error) {
                console.error('重新生成失败:', error);
                loadingDiv.innerHTML = `<p style="color:#e74c3c;">❌ 生成失败: ${error.message}</p>`;
                setTimeout(() => loadingDiv.remove(), 3000);
            }
        }
        
        // 3. 删除章节
        function deleteSection(sectionId, h2Element) {
            const sectionTitle = h2Element.textContent.split('\n')[0].trim();
            
            if (!confirm(`确定要删除章节"${sectionTitle}"吗?\n\n删除后可以通过"重新生成完整方案"恢复。`)) {
                return;
            }
            
            console.log(`删除章节: ${sectionId}`);
            
            // 删除H2及其后续内容(直到下一个H2)
            let currentElement = h2Element.nextElementSibling;
            while (currentElement && currentElement.tagName !== 'H2') {
                const next = currentElement.nextElementSibling;
                currentElement.remove();
                currentElement = next;
            }
            h2Element.remove();
            
            // 更新window.currentPlan
            updateCurrentPlanFromDOM();
            
            alert('✅ 章节已删除!');
        }
        
        // 从DOM更新window.currentPlan.aiResult
        function updateCurrentPlanFromDOM() {
            const resultDiv = document.getElementById('resultContent');
            
            // 从DOM重新构建Markdown格式
            let markdown = '';
            const elements = resultDiv.children;
            
            for (let el of elements) {
                const tagName = el.tagName.toLowerCase();
                const text = el.innerText.trim();
                
                if (!text) continue;
                
                // H2标题 - 提取纯文本(去除按钮)
                if (tagName === 'h2') {
                    const titleText = el.childNodes[0]?.textContent?.trim() || text.split('\n')[0];
                    markdown += `## ${titleText}\n\n`;
                }
                // H3标题
                else if (tagName === 'h3') {
                    markdown += `### ${text}\n\n`;
                }
                // H4标题
                else if (tagName === 'h4') {
                    markdown += `#### ${text}\n\n`;
                }
                // 列表
                else if (tagName === 'ul') {
                    const items = el.querySelectorAll('li');
                    items.forEach(li => {
                        markdown += `- ${li.innerText.trim()}\n`;
                    });
                    markdown += '\n';
                }
                else if (tagName === 'ol') {
                    const items = el.querySelectorAll('li');
                    items.forEach((li, index) => {
                        markdown += `${index + 1}. ${li.innerText.trim()}\n`;
                    });
                    markdown += '\n';
                }
                // 表格
                else if (tagName === 'table') {
                    const rows = el.querySelectorAll('tr');
                    rows.forEach((row, rowIndex) => {
                        const cells = row.querySelectorAll('th, td');
                        const cellTexts = Array.from(cells).map(cell => cell.innerText.trim());
                        markdown += `| ${cellTexts.join(' | ')} |\n`;
                        
                        // 表头分隔线
                        if (rowIndex === 0 && row.querySelector('th')) {
                            markdown += `| ${cellTexts.map(() => '---').join(' | ')} |\n`;
                        }
                    });
                    markdown += '\n';
                }
                // 引用块
                else if (tagName === 'blockquote') {
                    const lines = text.split('\n');
                    lines.forEach(line => {
                        if (line.trim()) markdown += `> ${line}\n`;
                    });
                    markdown += '\n';
                }
                // 普通段落
                else if (tagName === 'p') {
                    // 检查是否有加粗
                    const strongTags = el.querySelectorAll('strong');
                    if (strongTags.length > 0) {
                        let paraText = el.innerHTML;
                        paraText = paraText.replace(/<strong>(.*?)<\/strong>/g, '**$1**');
                        paraText = paraText.replace(/<[^>]+>/g, '');
                        markdown += `${paraText}\n\n`;
                    } else {
                        markdown += `${text}\n\n`;
                    }
                }
                // 其他元素
                else {
                    markdown += `${text}\n\n`;
                }
            }
            
            // 更新window.currentPlan
            window.currentPlan.aiResult = markdown.trim();
            window.currentPlan.aiResultHTML = resultDiv.innerHTML;
            
            console.log('✅ currentPlan已更新,Markdown长度:', markdown.length);
        }

        // 解析Markdown为Word结构
        function parseMarkdownForWord(markdown) {
            const sections = [];
            const lines = markdown.split('\n');
            let currentSection = null;

            for (let line of lines) {
                // H2 - 新章节
                if (line.startsWith('## ')) {
                    if (currentSection) {
                        sections.push(currentSection);
                    }
                    currentSection = {
                        title: line.replace(/^##\s*/, '').trim(),
                        content: []
                    };
                }
                // 章节内容
                else if (currentSection && line.trim()) {
                    currentSection.content.push(line);
                }
            }

            // 最后一个章节
            if (currentSection) {
                sections.push(currentSection);
            }

            return sections;
        }

        // 解析AI生成的Markdown为PPT结构
        function parseMarkdownForPPT(markdown) {
            const sections = [];
            const lines = markdown.split('\n');
            let currentSection = null;
            
            for (let line of lines) {
                // 二级标题 - 新章节
                if (line.startsWith('## ')) {
                    if (currentSection) {
                        // 将长内容拆分成多页
                        const pages = splitContentToPages(currentSection.content);
                        pages.forEach((pageContent, pageIndex) => {
                            sections.push({
                                title: currentSection.title + (pages.length > 1 ? ` (${pageIndex + 1}/${pages.length})` : ''),
                                content: pageContent
                            });
                        });
                    }
                    currentSection = {
                        title: line.replace(/^## /, '').trim(),
                        content: []
                    };
                }
                // 三级标题或内容
                else if (currentSection && line.trim()) {
                    currentSection.content.push(line);
                }
            }
            
            // 处理最后一个章节
            if (currentSection) {
                const pages = splitContentToPages(currentSection.content);
                pages.forEach((pageContent, pageIndex) => {
                    sections.push({
                        title: currentSection.title + (pages.length > 1 ? ` (${pageIndex + 1}/${pages.length})` : ''),
                        content: pageContent
                    });
                });
            }
            
            return sections;
        }
        
        // 智能分页:将长内容拆分成多页,每页不超过10行或800字符
        function splitContentToPages(contentLines) {
            const pages = [];
            let currentPage = [];
            let currentLength = 0;
            const MAX_LINES_PER_PAGE = 12;
            const MAX_CHARS_PER_PAGE = 600;
            
            for (let line of contentLines) {
                const lineLength = line.length;
                
                // 如果当前页已满,创建新页
                if (currentPage.length >= MAX_LINES_PER_PAGE || currentLength + lineLength > MAX_CHARS_PER_PAGE) {
                    if (currentPage.length > 0) {
                        pages.push([...currentPage]);
                        currentPage = [];
                        currentLength = 0;
                    }
                }
                
                currentPage.push(line);
                currentLength += lineLength;
            }
            
            // 添加最后一页
            if (currentPage.length > 0) {
                pages.push(currentPage);
            }
            
            return pages.length > 0 ? pages : [contentLines];
        }

                    if (!line) continue;
                    
                    // 三级标题
                    if (line.startsWith('###')) {
                        const title = line.replace(/^###\s*/, '').replace(/\*\*/g, '');
                        slide.addText(title, {
                            x: 0.6, y: yPos, w: 8.8,
                            fontSize: 14, bold: true, color: accentColor
                        });
                        yPos += lineHeight;
                    }
                    // 列表项
                    else if (line.match(/^[-*•]\s/) || line.match(/^\d+\.\s/)) {
                        const text = line.replace(/^[-*•]\s/, '').replace(/^\d+\.\s/, '').replace(/\*\*/g, '');
                        slide.addText('• ' + text, {
                            x: 0.8, y: yPos, w: 8.6,
                            fontSize: 11, color: '333333'
                        });
                        yPos += lineHeight * 0.9;
                    }
                    // 表格行(简单处理:显示为文本)
                    else if (line.includes('|')) {
                        const text = line.replace(/\|/g, ' | ').replace(/\*\*/g, '');
                        slide.addText(text, {
                            x: 0.8, y: yPos, w: 8.6,
                            fontSize: 10, color: '666666', fontFace: 'Courier New'
                        });
                        yPos += lineHeight * 0.8;
                    }
                    // 普通段落
                    else {
                        const text = line.replace(/\*\*/g, '').substring(0, 150);
                        slide.addText(text, {
                            x: 0.8, y: yPos, w: 8.6,
                            fontSize: 11, color: '595959'
                        });
                        yPos += lineHeight;
                    }
                }
            });
            
            // 保存PPT
            const totalPages = Math.min(sections.length, 20) + 1;  // +1是封面
            pptx.writeFile({ fileName: (plan.dramaName || '剧集') + '_AI营销方案_v3.0.pptx' })
                .then(() => {
                    alert(`✅ PPT已生成下载！\n\n• 总页数: ${totalPages}页\n• 内容: 基于AI真实生成方案\n• 格式: 已优化分页和排版`);
                })
                .catch(err => {
                    console.error('PPT生成失败:', err);
                    alert('❌ PPT生成失败，请重试！');
                });
        }
    </script>
</body>
</html>
