<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大剧营销方案生成器 PRO v2.0 | AI定制版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(221, 118, 148, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(83, 183, 111, 0.25) 0%, transparent 50%),
                linear-gradient(180deg, 
                    #FFF8FA 0%, 
                    #FFF5F7 20%,
                    #F8FBF9 50%,
                    #F0F9F3 80%,
                    #EBF7EE 100%
                );
            min-height: 100vh;
            padding: 30px 20px;
            color: #262626;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(221, 118, 148, 0.12) 0%, transparent 25%),
                radial-gradient(circle at 85% 75%, rgba(83, 183, 111, 0.12) 0%, transparent 25%),
                radial-gradient(circle at 50% 50%, rgba(221, 118, 148, 0.06) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 20px;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            filter: drop-shadow(0 2px 12px rgba(221, 118, 148, 0.35)) drop-shadow(0 2px 20px rgba(83, 183, 111, 0.25));
            animation: logoFloat 4s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0) scale(1);
                filter: drop-shadow(0 2px 12px rgba(221, 118, 148, 0.35)) drop-shadow(0 2px 20px rgba(83, 183, 111, 0.25));
            }
            50% {
                transform: translateY(-5px) scale(1.03);
                filter: drop-shadow(0 5px 18px rgba(221, 118, 148, 0.5)) drop-shadow(0 5px 28px rgba(83, 183, 111, 0.4));
            }
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        .header h1 {
            font-size: 2.8em;
            font-weight: 800;
            color: #262626;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .header h1 .highlight {
            background: linear-gradient(135deg, #53B76F 0%, #3D9F5A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, #DD7694 0%, #C9627D 100%);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(221, 118, 148, 0.25);
            margin-left: 10px;
        }

        .header p {
            font-size: 1.1em;
            color: #595959;
            margin-top: 15px;
            line-height: 1.8;
        }

        .form-section {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            border: 1px solid #F0F0F0;
        }

        .form-section h2 {
            color: #262626;
            font-size: 1.6em;
            margin-bottom: 30px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-weight: 600;
            color: #262626;
            margin-bottom: 10px;
            font-size: 1.05em;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 16px 20px;
            border: 2px solid #E8E8E8;
            border-radius: 12px;
            font-size: 1.05em;
            transition: all 0.3s ease;
            background: #FAFAFA;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #53B76F;
            background: white;
            box-shadow: 0 0 0 3px rgba(83, 183, 111, 0.1);
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #53B76F 0%, #3D9F5A 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.15em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(83, 183, 111, 0.3);
            letter-spacing: 0.5px;
            margin-top: 30px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(83, 183, 111, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 20px;
            margin: 30px 0;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #E6F4EB;
            border-top-color: #53B76F;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: #595959;
            font-size: 1.1em;
        }

        .result-section {
            display: none;
            background: white;
            border-radius: 20px;
            margin-top: 30px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }

        .result-header {
            background: linear-gradient(135deg, 
                rgba(221, 118, 148, 0.12) 0%, 
                rgba(83, 183, 111, 0.12) 100%
            );
            border: 2px solid rgba(83, 183, 111, 0.3);
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .result-header h2 {
            color: #53B76F;
            font-size: 1.8em;
            font-weight: 700;
        }

        .action-btns {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 20px;
            background: white;
            border: 2px solid #53B76F;
            border-radius: 10px;
            color: #53B76F;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #53B76F;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(83, 183, 111, 0.25);
        }

        .result-content {
            padding: 40px;
            line-height: 1.8;
        }

        .result-content h3 {
            color: #53B76F;
            font-size: 1.5em;
            margin: 35px 0 20px 0;
            padding-bottom: 12px;
            border-bottom: 3px solid rgba(221, 118, 148, 0.3);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-content p {
            margin: 12px 0;
            color: #595959;
        }

        .result-content strong {
            color: #262626;
            font-weight: 600;
        }

        .strategy-item {
            background: linear-gradient(135deg, 
                rgba(221, 118, 148, 0.08) 0%, 
                rgba(83, 183, 111, 0.08) 100%
            );
            border-left: 4px solid #53B76F;
            padding: 20px 25px;
            margin: 20px 0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .strategy-item strong {
            color: #53B76F;
            font-size: 1.15em;
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .insight-card {
            background: linear-gradient(135deg, #FFF8FA 0%, #F8FBF9 100%);
            border: 2px solid rgba(221, 118, 148, 0.2);
            border-radius: 12px;
            padding: 20px;
            margin: 15px 0;
        }

        .insight-card h4 {
            color: #DD7694;
            font-size: 1.1em;
            margin-bottom: 10px;
        }

        .copywriting-item {
            background: white;
            border: 2px solid #E8E8E8;
            border-radius: 10px;
            padding: 15px 20px;
            margin: 12px 0;
            transition: all 0.3s ease;
        }

        .copywriting-item:hover {
            border-color: #53B76F;
            box-shadow: 0 2px 8px rgba(83, 183, 111, 0.15);
        }

        .copywriting-item .label {
            color: #DD7694;
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .copywriting-item .text {
            color: #262626;
            font-size: 1.05em;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .form-section {
                padding: 25px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .result-content {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- 底座 - 带颜色呼吸 -->
                    <rect x="20" y="55" width="60" height="30" rx="3" fill="#53B76F">
                        <animate attributeName="fill" values="#53B76F;#62c47f;#53B76F" dur="2.5s" repeatCount="indefinite"/>
                    </rect>
                    
                    <!-- 导演板主体 - 带轻微晃动 -->
                    <g transform="rotate(-15 50 40)">
                        <animateTransform 
                            attributeName="transform" 
                            type="rotate" 
                            values="-15 50 40;-13 50 40;-15 50 40" 
                            dur="4s" 
                            repeatCount="indefinite"/>
                        
                        <rect x="15" y="30" width="70" height="20" rx="2" fill="#DD7694">
                            <animate attributeName="fill" values="#DD7694;#e886a4;#DD7694" dur="2.5s" repeatCount="indefinite"/>
                        </rect>
                        
                        <!-- 黑白条纹 - 波浪闪烁 -->
                        <rect x="20" y="32" width="8" height="16" fill="white">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="0s"/>
                        </rect>
                        <rect x="31" y="32" width="8" height="16" fill="white">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="0.3s"/>
                        </rect>
                        <rect x="42" y="32" width="8" height="16" fill="white">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="0.6s"/>
                        </rect>
                        <rect x="53" y="32" width="8" height="16" fill="white">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="0.9s"/>
                        </rect>
                        <rect x="64" y="32" width="8" height="16" fill="white">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="1.2s"/>
                        </rect>
                        <rect x="75" y="32" width="8" height="16" fill="white">
                            <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" begin="1.5s"/>
                        </rect>
                    </g>
                    
                    <!-- 螺丝钉 - 轻微脉冲 -->
                    <circle cx="22" cy="55" r="3" fill="#262626">
                        <animate attributeName="r" values="3;3.3;3" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="78" cy="55" r="3" fill="#262626">
                        <animate attributeName="r" values="3;3.3;3" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    
                    <!-- 底座纹理 - 呼吸 -->
                    <rect x="28" y="63" width="44" height="3" rx="1.5" fill="white" opacity="0.3">
                        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
                    </rect>
                    <rect x="28" y="70" width="30" height="3" rx="1.5" fill="white" opacity="0.3">
                        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
                    </rect>
                    
                    <!-- 装饰星星 - 柔和闪烁 -->
                    <circle cx="15" cy="22" r="2" fill="#DD7694" opacity="0.7">
                        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2s" repeatCount="indefinite"/>
                        <animate attributeName="r" values="2;2.3;2" dur="2s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="85" cy="25" r="1.8" fill="#53B76F" opacity="0.6">
                        <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.3s" repeatCount="indefinite"/>
                        <animate attributeName="r" values="1.8;2.1;1.8" dur="2.3s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="13" cy="80" r="1.6" fill="#DD7694" opacity="0.65">
                        <animate attributeName="opacity" values="0.65;0.15;0.65" dur="2.5s" repeatCount="indefinite"/>
                        <animate attributeName="r" values="1.6;1.9;1.6" dur="2.5s" repeatCount="indefinite"/>
                    </circle>
                    <circle cx="87" cy="82" r="1.9" fill="#53B76F" opacity="0.7">
                        <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.2s" repeatCount="indefinite"/>
                        <animate attributeName="r" values="1.9;2.2;1.9" dur="2.2s" repeatCount="indefinite"/>
                    </circle>
                </svg>
            </div>
            <h1><span class="highlight">大剧营销方案生成器</span> PRO <span class="version-badge">v2.0 AI定制版</span></h1>
            <p>基于智能规则引擎，结合剧集内容深度定制营销策略<br>输出用户洞察、策略文案、平台玩法，真正可落地执行的专业方案</p>
        </div>

        <div class="form-section">
            <h2>📝 剧集信息填写</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>剧集名称 *</label>
                    <input type="text" id="dramaName" placeholder="例如: 庆余年2">
                </div>
                <div class="form-group">
                    <label>类型定位 *</label>
                    <select id="dramaType">
                        <option value="">请选择...</option>
                        <option value="古装剧">古装剧</option>
                        <option value="现代都市剧">现代都市剧</option>
                        <option value="悬疑推理剧">悬疑推理剧</option>
                        <option value="爱情剧">爱情剧</option>
                        <option value="家庭伦理剧">家庭伦理剧</option>
                        <option value="职场剧">职场剧</option>
                        <option value="青春校园剧">青春校园剧</option>
                        <option value="科幻剧">科幻剧</option>
                        <option value="历史剧">历史剧</option>
                        <option value="军旅剧">军旅剧</option>
                        <option value="医疗剧">医疗剧</option>
                        <option value="律政剧">律政剧</option>
                        <option value="谍战剧">谍战剧</option>
                        <option value="年代剧">年代剧</option>
                        <option value="喜剧">喜剧</option>
                        <option value="农村剧">农村剧</option>
                        <option value="主旋律剧">主旋律剧</option>
                        <option value="奇幻剧">奇幻剧</option>
                        <option value="武侠剧">武侠剧</option>
                        <option value="短剧">短剧</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label>核心卖点 *</label>
                    <input type="text" id="coreSelling" placeholder="例如: 顶级流量+大IP改编+权谋爽剧+特效震撼">
                </div>
                <div class="form-group full-width">
                    <label>剧情梗概（简述故事主线和核心冲突）*</label>
                    <textarea id="plotSummary" placeholder="例如: 讲述现代青年穿越到古代权谋世界，从底层逆袭成为一代权臣的故事。核心冲突：个人理想vs家族利益，现代思维vs古代规则。"></textarea>
                </div>
                <div class="form-group">
                    <label>情感核心 *</label>
                    <select id="emotionCore">
                        <option value="">请选择...</option>
                        <option value="热血励志">热血励志（逆袭成长）</option>
                        <option value="浪漫甜蜜">浪漫甜蜜（恋爱糖分）</option>
                        <option value="虐心催泪">虐心催泪（情感冲击）</option>
                        <option value="爽感刺激">爽感刺激（打脸反转）</option>
                        <option value="温情治愈">温情治愈（情感共鸣）</option>
                        <option value="紧张悬疑">紧张悬疑（烧脑推理）</option>
                        <option value="幽默搞笑">幽默搞笑（轻松解压）</option>
                        <option value="家国情怀">家国情怀（价值认同）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>目标情绪（想让观众产生的感受）*</label>
                    <select id="targetEmotion">
                        <option value="">请选择...</option>
                        <option value="热血沸腾">热血沸腾（想奋斗）</option>
                        <option value="甜蜜上头">甜蜜上头（想恋爱）</option>
                        <option value="泪流满面">泪流满面（共情落泪）</option>
                        <option value="畅快淋漓">畅快淋漓（爽感满足）</option>
                        <option value="温暖感动">温暖感动（心灵治愈）</option>
                        <option value="紧张刺激">紧张刺激（想追剧）</option>
                        <option value="放松欢乐">放松欢乐（解压娱乐）</option>
                        <option value="思考共鸣">思考共鸣（价值认同）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>演员阵容 *</label>
                    <select id="castType">
                        <option value="">请选择...</option>
                        <option value="顶级流量明星">顶级流量明星（粉丝5000万+）</option>
                        <option value="一线实力派">一线实力派（演技+口碑）</option>
                        <option value="流量+实力组合">流量+实力组合（平衡配置）</option>
                        <option value="新人演员">新人演员（新鲜面孔）</option>
                        <option value="中生代演员">中生代演员（稳定观众基础）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>IP类型 *</label>
                    <select id="ipType">
                        <option value="">请选择...</option>
                        <option value="原创剧本">原创剧本</option>
                        <option value="小说改编">小说改编（有书粉基础）</option>
                        <option value="漫画改编">漫画改编（二次元受众）</option>
                        <option value="海外翻拍">海外翻拍（有对标作品）</option>
                        <option value="真实事件改编">真实事件改编（社会话题）</option>
                        <option value="经典IP重拍">经典IP重拍（情怀牌）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>播出平台 *</label>
                    <select id="platform">
                        <option value="">请选择...</option>
                        <option value="爱奇艺">爱奇艺</option>
                        <option value="腾讯视频">腾讯视频</option>
                        <option value="优酷">优酷</option>
                        <option value="芒果TV">芒果TV</option>
                        <option value="央视">央视</option>
                        <option value="卫视">卫视</option>
                        <option value="多平台联播">多平台联播</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>营销预算 *</label>
                    <select id="budget">
                        <option value="">请选择...</option>
                        <option value="100万以内">100万以内（小成本）</option>
                        <option value="100-500万">100-500万（中等规模）</option>
                        <option value="500-1000万">500-1000万（大制作）</option>
                        <option value="1000万以上">1000万以上（S级项目）</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>目标受众 *</label>
                    <select id="audience">
                        <option value="">请选择...</option>
                        <option value="18-25岁年轻女性">18-25岁年轻女性</option>
                        <option value="25-35岁都市女性">25-35岁都市女性</option>
                        <option value="18-30岁男性">18-30岁男性</option>
                        <option value="35-50岁中年观众">35-50岁中年观众</option>
                        <option value="全年龄段家庭观众">全年龄段家庭观众</option>
                        <option value="学生党">学生党</option>
                        <option value="职场人群">职场人群</option>
                    </select>
                </div>
                <div class="form-group">

        // 主生成函数
        async function generatePlan() {
            const dramaName = document.getElementById('dramaName').value;
            const dramaType = document.getElementById('dramaType').value;
            const platform = document.getElementById('platform').value;
            const budget = document.getElementById('budget').value;
            const audience = document.getElementById('audience').value;
            const stage = document.getElementById('stage').value;
            const coreSelling = document.getElementById('coreSelling').value;
            const plotSummary = document.getElementById('plotSummary').value;
            const emotionCore = document.getElementById('emotionCore').value;
            const targetEmotion = document.getElementById('targetEmotion').value;
            const castType = document.getElementById('castType').value;
            const ipType = document.getElementById('ipType').value;

            if (!dramaName || !dramaType || !platform || !budget || !audience || !stage || 
                !coreSelling || !plotSummary || !emotionCore || !targetEmotion || !castType || !ipType) {
                alert('请填写所有必填项！');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';

            try {
                // 智能检测后端地址
                const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' || window.location.protocol === 'file:'
                    ? 'http://localhost:3000'
                    : (window.BACKEND_URL || 'https://drama-marketing-api.onrender.com');

                // 调用AI后端生成营销方案
                const response = await fetch(`${API_BASE_URL}/api/generate-drama-marketing`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        dramaName, dramaType, platform, budget, audience, stage,
                        coreSelling, plotSummary, emotionCore, targetEmotion, castType, ipType
                    })
                });

                if (!response.ok) {
                    throw new Error('后端服务暂时不可用，请稍后重试');
                }

                const data = await response.json();
                
                const plan = {
                    dramaName, dramaType, platform, budget, audience, stage,
                    coreSelling, plotSummary, emotionCore, targetEmotion, castType, ipType,
                    timestamp: new Date().toLocaleString('zh-CN'),
                    aiResult: data.result // AI生成的完整内容
                };
                
                window.currentPlan = plan;
                displayAIResult(plan);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                console.error('生成失败：', error);
                alert('生成失败：' + error.message + '\\n\\n请确保后端服务正在运行');
                document.getElementById('loading').style.display = 'none';
            }
        }

            const resultDiv = document.getElementById('result');

            const htmlContent = plan.aiResult
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/^/, '<p>')
                .replace(/$/, '</p>')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/### (.*?)<br>/g, '<h3>$1</h3>')
                .replace(/## (.*?)<br>/g, '<h2>$1</h2>')
                .replace(/# (.*?)<br>/g, '<h1>$1</h1>');
            
            resultDiv.innerHTML = htmlContent;
        }
