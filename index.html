<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大剧营销方案生成器 PRO | 专业版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            /* 水墨晕染背景 - 苏梅到青翠 */
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(221, 118, 148, 0.25) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(83, 183, 111, 0.25) 0%, transparent 50%),
                linear-gradient(180deg, 
                    #FFF8FA 0%, 
                    #FFF5F7 20%,
                    #F8FBF9 50%,
                    #F0F9F3 80%,
                    #EBF7EE 100%
                );
            min-height: 100vh;
            padding: 30px 20px;
            color: #262626;
            position: relative;
        }
        
        /* 水墨纹理叠加 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(221, 118, 148, 0.12) 0%, transparent 25%),
                radial-gradient(circle at 85% 75%, rgba(83, 183, 111, 0.12) 0%, transparent 25%),
                radial-gradient(circle at 50% 50%, rgba(221, 118, 148, 0.06) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            position: relative;
            z-index: 1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 20px;
        }

        /* Logo - 导演板图标（保持不变） */
        .logo {
            width: 100px;
            height: 100px;
            margin: 0 auto 25px;
            position: relative;
            filter: drop-shadow(0 4px 12px rgba(82, 196, 26, 0.15));
        }

        .logo svg {
            width: 100%;
            height: 100%;
        }

        .header h1 {
            font-size: 2.8em;
            margin-bottom: 12px;
            font-weight: 700;
            color: #262626;
            letter-spacing: 1px;
        }

        .header h1 .highlight {
            background: linear-gradient(135deg, #53B76F 0%, #3D9F5A 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            font-size: 1.1em;
            color: #595959;
            font-weight: 400;
            margin-bottom: 15px;
        }

        .version-badge {
            display: inline-block;
            background: linear-gradient(135deg, #DD7694 0%, #C9627D 100%);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            box-shadow: 0 2px 8px rgba(221, 118, 148, 0.25);
        }

        .main-card {
            background: white;
            border-radius: 24px;
            padding: 45px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            margin-bottom: 30px;
            border: 1px solid #F0F0F0;
        }

        .section-title {
            font-size: 1.5em;
            color: #262626;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
        }

        .section-title .icon {
            font-size: 1.3em;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 35px;
        }

        .form-group label {
            display: block;
            color: #595959;
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 0.95em;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #FAFAFA;
            border: 2px solid #D9D9D9;
            border-radius: 12px;
            color: #262626;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #53B76F;
            background: white;
            box-shadow: 0 0 0 3px rgba(83, 183, 111, 0.1);
        }

        .form-group select {
            cursor: pointer;
        }

        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #53B76F 0%, #3D9F5A 100%);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 1.15em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(83, 183, 111, 0.3);
            letter-spacing: 0.5px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(83, 183, 111, 0.4);
        }

        .generate-btn:active {
            transform: translateY(0);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 60px 20px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #E6F4EB;
            border-top-color: #53B76F;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: #595959;
            font-size: 1.05em;
        }

        .result-section {
            display: none;
            margin-top: 40px;
        }

        .result-header {
            background: linear-gradient(135deg, 
                rgba(221, 118, 148, 0.12) 0%, 
                rgba(83, 183, 111, 0.12) 100%
            );
            border: 2px solid rgba(83, 183, 111, 0.3);
            border-radius: 20px 20px 0 0;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .result-header h2 {
            color: #53B76F;
            font-size: 1.8em;
            font-weight: 700;
        }

        .action-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 10px 20px;
            background: white;
            border: 2px solid #53B76F;
            border-radius: 10px;
            color: #53B76F;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            background: #53B76F;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(83, 183, 111, 0.25);
        }

        .result-content {
            background: white;
            border: 2px solid #F0F0F0;
            border-top: none;
            border-radius: 0 0 20px 20px;
            padding: 40px;
            color: #262626;
            line-height: 1.8;
        }

        .result-content h3 {
            color: #53B76F;
            font-size: 1.5em;
            margin: 35px 0 20px 0;
            padding-bottom: 12px;
            border-bottom: 3px solid rgba(221, 118, 148, 0.3);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-content h3:first-child {
            margin-top: 0;
        }

        .result-content p {
            margin: 12px 0;
            color: #595959;
        }

        .result-content strong {
            color: #262626;
            font-weight: 600;
        }

        .strategy-item {
            background: linear-gradient(135deg, 
                rgba(221, 118, 148, 0.08) 0%, 
                rgba(83, 183, 111, 0.08) 100%
            );
            border-left: 4px solid #53B76F;
            padding: 20px 25px;
            margin: 20px 0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .strategy-item strong {
            color: #53B76F;
            font-size: 1.15em;
            display: block;
            margin-bottom: 12px;
            font-weight: 700;
        }

        .chart-container {
            max-width: 450px;
            margin: 35px auto;
            padding: 30px;
            background: #FAFAFA;
            border-radius: 16px;
            border: 2px solid #F0F0F0;
        }



        @media (max-width: 768px) {
            .header h1 {
                font-size: 2em;
            }
            
            .main-card {
                padding: 30px 20px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .result-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .result-content {
                padding: 25px 20px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <!-- 导演板图标 - 青翠+苏梅配色 -->
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- 底部板 - 青翠色 -->
                    <rect x="20" y="55" width="60" height="30" rx="3" fill="#53B76F"/>
                    <!-- 顶部拍板 - 苏梅色 -->
                    <g transform="rotate(-15 50 40)">
                        <rect x="15" y="30" width="70" height="20" rx="2" fill="#DD7694"/>
                        <!-- 黑白条纹 -->
                        <rect x="20" y="32" width="8" height="16" fill="white"/>
                        <rect x="31" y="32" width="8" height="16" fill="white"/>
                        <rect x="42" y="32" width="8" height="16" fill="white"/>
                        <rect x="53" y="32" width="8" height="16" fill="white"/>
                        <rect x="64" y="32" width="8" height="16" fill="white"/>
                        <rect x="75" y="32" width="8" height="16" fill="white"/>
                    </g>
                    <!-- 铰链 -->
                    <circle cx="22" cy="55" r="3" fill="#262626"/>
                    <circle cx="78" cy="55" r="3" fill="#262626"/>
                    <!-- 文字区域装饰 -->
                    <rect x="28" y="63" width="44" height="3" rx="1.5" fill="white" opacity="0.3"/>
                    <rect x="28" y="70" width="30" height="3" rx="1.5" fill="white" opacity="0.3"/>
                </svg>
            </div>
            <h1><span class="highlight">大剧</span>营销方案生成器</h1>
            <p class="subtitle">基于140种营销策略，智能生成全链路营销方案</p>
            <span class="version-badge">PRO 专业版</span>
        </div>

        <div class="main-card">
            <h2 class="section-title"><span class="icon">📝</span> 填写剧集信息</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>剧名 *</label>
                    <input type="text" id="dramaName" placeholder="例如: 长风破浪">
                </div>
                <div class="form-group">
                    <label>剧集类型 *</label>
                    <select id="dramaType">
                        <option value="">请选择...</option>
                        <option value="古装权谋">古装权谋</option>
                        <option value="古装仙侠">古装仙侠</option>
                        <option value="古装武侠">古装武侠</option>
                        <option value="古装言情">古装言情</option>
                        <option value="现代都市">现代都市</option>
                        <option value="职场商战">职场商战</option>
                        <option value="都市情感">都市情感</option>
                        <option value="悬疑推理">悬疑推理</option>
                        <option value="刑侦破案">刑侦破案</option>
                        <option value="谍战">谍战</option>
                        <option value="年代剧">年代剧</option>
                        <option value="家庭伦理">家庭伦理</option>
                        <option value="青春校园">青春校园</option>
                        <option value="偶像甜宠">偶像甜宠</option>
                        <option value="科幻">科幻</option>
                        <option value="奇幻">奇幻</option>
                        <option value="历史正剧">历史正剧</option>
                        <option value="军旅">军旅</option>
                        <option value="医疗">医疗</option>
                        <option value="乡村振兴">乡村振兴</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>播出平台 *</label>
                    <select id="platform">
                        <option value="">请选择...</option>
                        <option value="腾讯视频">腾讯视频</option>
                        <option value="爱奇艺">爱奇艺</option>
                        <option value="优酷">优酷</option>
                        <option value="芒果TV">芒果TV</option>
                        <option value="bilibili">bilibili</option>
                        <option value="央视频">央视频</option>
                        <option value="多平台联播">多平台联播</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>营销预算 *</label>
                    <select id="budget">
                        <option value="">请选择...</option>
                        <option value="300-500万">300-500万</option>
                        <option value="500-1000万">500-1000万</option>
                        <option value="1000-3000万">1000-3000万</option>
                        <option value="3000-5000万">3000-5000万</option>
                        <option value="5000万+">5000万以上</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>目标人群 *</label>
                    <select id="audience">
                        <option value="">请选择...</option>
                        <option value="Z世代(18-25岁)">Z世代 (18-25岁)</option>
                        <option value="职场白领(25-35岁)">职场白领 (25-35岁)</option>
                        <option value="家庭主力(30-45岁)">家庭主力 (30-45岁)</option>
                        <option value="中老年(45岁+)">中老年 (45岁+)</option>
                        <option value="全年龄段">全年龄段</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>营销阶段 *</label>
                    <select id="stage">
                        <option value="">请选择...</option>
                        <option value="概念期">概念期 (项目立项/筹备)</option>
                        <option value="预热期">预热期 (上线前30-60天)</option>
                        <option value="热播期">热播期 (正在播出)</option>
                        <option value="收官期">收官期 (即将完结)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>核心卖点 *</label>
                    <input type="text" id="coreSelling" placeholder="例如: 顶级卡司+大IP改编+社会话题">
                </div>
                <div class="form-group">
                    <label>演员阵容 *</label>
                    <select id="castType">
                        <option value="">请选择...</option>
                        <option value="顶级流量明星">顶级流量明星 (粉丝5000万+)</option>
                        <option value="一线实力派">一线实力派 (演技+口碑)</option>
                        <option value="流量+实力组合">流量+实力组合 (平衡配置)</option>
                        <option value="新人演员">新人演员 (新鲜面孔)</option>
                        <option value="中生代演员">中生代演员 (稳定观众基础)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>IP类型 *</label>
                    <select id="ipType">
                        <option value="">请选择...</option>
                        <option value="原创剧本">原创剧本</option>
                        <option value="小说改编">小说改编 (有书粉基础)</option>
                        <option value="漫画改编">漫画改编 (二次元受众)</option>
                        <option value="海外翻拍">海外翻拍 (有对标作品)</option>
                        <option value="真实事件改编">真实事件改编 (社会话题)</option>
                        <option value="经典IP重拍">经典IP重拍 (情怀牌)</option>
                    </select>
                </div>
            </div>
            <button class="generate-btn" onclick="generatePlan()">🚀 生成专业营销方案</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>AI正在分析140种营销策略，智能匹配最佳方案...</p>
        </div>

        <div class="result-section" id="resultSection">
            <div class="result-header">
                <h2>📊 营销方案</h2>
                <div class="action-btns">
                    <button class="action-btn" onclick="exportMarkdown()">📥 导出MD</button>
                    <button class="action-btn" onclick="exportPPT()">📊 下载PPT</button>
                    <button class="action-btn" onclick="printPlan()">🖨️ 打印</button>
                    <button class="action-btn" onclick="sharePlan()">🔗 分享</button>
                </div>
            </div>
            <div class="result-content" id="resultContent"></div>
        </div>


    </div>

    <script>
        function generatePlan() {
            const dramaName = document.getElementById('dramaName').value;
            const dramaType = document.getElementById('dramaType').value;
            const platform = document.getElementById('platform').value;
            const budget = document.getElementById('budget').value;
            const audience = document.getElementById('audience').value;
            const stage = document.getElementById('stage').value;
            const coreSelling = document.getElementById('coreSelling').value;
            const castType = document.getElementById('castType').value;
            const ipType = document.getElementById('ipType').value;

            if (!dramaName || !dramaType || !platform || !budget || !audience || !stage || !coreSelling || !castType || !ipType) {
                alert('请填写所有必填项！');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';

            setTimeout(() => {
                const plan = { dramaName, dramaType, platform, budget, audience, stage, coreSelling, castType, ipType, timestamp: new Date().toLocaleString('zh-CN') };
                window.currentPlan = plan; // 保存到全局变量，供PPT导出使用
                displayResult(plan);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
            }, 2000);
        }

        function displayResult(plan) {
            const content = `
                <h3>🎯 本体分析</h3>
                <p><strong>剧集名称：</strong>${plan.dramaName}</p>
                <p><strong>类型定位：</strong>${plan.dramaType}</p>
                <p><strong>核心卖点：</strong>${plan.coreSelling}</p>
                <p><strong>IP类型：</strong>${plan.ipType}</p>
                <p><strong>演员阵容：</strong>${plan.castType}</p>
                <p><strong>IP价值分析：</strong>${plan.ipType === '小说改编' || plan.ipType === '漫画改编' ? '具备原著粉丝基础，可激活书粉/漫粉社群，预期自然流量占比20-30%' : plan.ipType === '原创剧本' ? '无原著束缚，创作自由度高，需要从零建立IP认知，营销难度较大但空间更大' : '有对标作品参考，可借鉴成功经验，降低市场风险'}</p>
                <p><strong>演员粉丝价值：</strong>${plan.castType === '顶级流量明星' ? '自带5000万+粉丝流量，预期粉丝转化率15-20%，社交媒体天然热度保障' : plan.castType === '一线实力派' ? '口碑保障，豆瓣评分预期7.5+，中高端受众覆盖，长尾价值高' : plan.castType === '流量+实力组合' ? '平衡流量与口碑，粉丝经济+品质保证双驱动，风险可控' : '新鲜感强，营销成本可控，需加大内容营销投入弥补明星光环不足'}</p>
                <p><strong>制作水准：</strong>一线团队+${plan.castType}配置，视觉质感+情感共鸣双重保障</p>

                <h3>📈 市场分析</h3>
                <div class="strategy-item">
                    <strong>1. 竞品分析</strong>
                    <p><strong>同期竞品：</strong>同类型热播剧3-5部，差异化竞争策略聚焦独特叙事视角</p>
                    <p><strong>市场空位：</strong>${plan.dramaType}赛道仍有内容缺口，本剧填补市场需求</p>
                    <p><strong>优势对比：</strong>演员阵容 > 竞品A，制作投入 > 竞品B，营销预算 ${plan.budget}</p>
                </div>
                <div class="strategy-item">
                    <strong>2. 目标受众画像</strong>
                    <p><strong>核心人群：</strong>${plan.audience}，占比60%</p>
                    <p><strong>拓展人群：</strong>泛娱乐用户、剧粉圈层、KOL粉丝，占比30%</p>
                    <p><strong>长尾人群：</strong>路人观众、短视频用户，占比10%</p>
                    <p><strong>用户需求：</strong>情感共鸣、话题参与、社交货币、审美满足</p>
                </div>
                <div class="strategy-item">
                    <strong>3. 平台生态分析</strong>
                    <p><strong>播出平台：</strong>${plan.platform}</p>
                    <p><strong>平台用户：</strong>MAU 2-5亿，日活1-3亿，付费会员5000万-1亿</p>
                    <p><strong>平台资源：</strong>开屏广告、热搜推荐、官方账号联动、会员权益绑定</p>
                    <p><strong>分发策略：</strong>首播独家 + 48小时全网分发，最大化覆盖</p>
                </div>

                <h3>🎨 内容策略（超详细）</h3>
                
                <div class="strategy-item">

        function exportMarkdown() {
            const content = document.getElementById('resultContent').innerText;
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${document.getElementById('dramaName').value}_营销方案.md`;
            a.click();
        }

        function printPlan() {
            window.print();
        }

        function sharePlan() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: '大剧营销方案', url: url });
            } else {
                navigator.clipboard.writeText(url);
                alert('链接已复制到剪贴板！');
            }
