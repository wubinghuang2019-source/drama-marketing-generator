    <style>

            margin-bottom: 10px;

        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }

        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            font-size: 1.1rem;

        }

        }

        .form-section {
            background: #f8f9fa;

        }

        .form-grid {
            display: grid;

        label {

        input, select {

            border: 2px solid #e0e0e0;
            border-radius: 8px;

        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;

        .btn {

            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;

        .result-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-content {
            background: white;
            border: 2px solid #667eea;
            border-top: none;
            border-radius: 0 0 10px 10px;
            padding: 30px;
        }

        .section-title {
            color: #667eea;
            font-size: 1.5rem;
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .section-content {
            margin-bottom: 25px;
            line-height: 1.8;
            color: #444;
        }

        .strategy-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 4px solid #667eea;
        }

        .strategy-title {
            font-weight: 700;
            color: #667eea;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .chart-container {
            width: 100%;
            max-width: 400px;
            margin: 30px auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn-secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 10px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;

        .history-item {

            padding: 15px;
            margin: 10px 0;

            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .history-item:hover {
            border-color: #667eea;
            transform: translateX(5px);
        }

        @media (max-width: 768px) {
            .container {
                border-radius: 0;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .content {
                padding: 20px;
            }
            
            .form-grid {

            }
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .spinner {

            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🎬</div>
            <h1>剧集营销方案生成器 PRO</h1>

        <div class="content">

                            <option value="年代剧">年代剧</option>

                            <option value="青春校园">青春校园</option>
                            <option value="偶像甜宠">偶像甜宠</option>
                            <option value="科幻">科幻</option>
                            <option value="奇幻">奇幻</option>

                            <option value="">请选择...</option>
                            <option value="腾讯视频">腾讯视频</option>

            <div class="loading" id="loading">

            <div class="result-section" id="resultSection">

    <script>
        // 营销策略数据库
        const strategies = {
            content: ['SEO优化', '内容矩阵', 'UGC激励', '话题营销', '内容裂变'],

            pr: ['媒体报道', '专访', '播客', '行业峰会', '专家背书']

        // 生成方案

            const dramaType = document.getElementById('dramaType').value;
            const platform = document.getElementById('platform').value;
            const budget = document.getElementById('budget').value;
            const audience = document.getElementById('audience').value;
            const stage = document.getElementById('stage').value;

            if (!dramaName || !dramaType || !platform || !budget || !audience || !stage) {
                alert('请填写所有必填项！');
                return;
            }

            // 显示加载动画
            document.getElementById('loading').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';

            // 模拟AI生成过程
            setTimeout(() => {
                const plan = {
                    dramaName, dramaType, platform, budget, audience, stage,
                    timestamp: new Date().toLocaleString('zh-CN')
                };

                displayResult(plan);
                saveTHistory(plan);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultSection').style.display = 'block';
                document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
            }, 2000);
        }

                    <p><strong>图文矩阵：</strong>微博/小红书/知乎，打造话题热度</p>
                    <p><strong>长视频：</strong>花絮/采访/幕后，深度内容沉淀</p>
                </div>
                <div class="strategy-item">
                    <div class="strategy-title">2. SEO关键词布局</div>
                    <p>核心词：${plan.dramaName}、${plan.dramaType}、${plan.platform}在线观看</p>
                    <p>长尾词：${plan.dramaName}演员阵容、${plan.dramaName}剧情介绍、${plan.dramaName}在哪看</p>
                </div>

                <h2 class="section-title">🚀 渠道策略</h2>
                <div class="section-content">
                    <p><strong>短视频（预算占比30%）：</strong></p>
                    <p>• 抖音/快手：头部+中腰部KOL矩阵，日均曝光500万+</p>
                    <p>• 视频号：私域流量激活，企业号+达人号组合</p>
                    
                    <p><strong>社交媒体（预算占比25%）：</strong></p>
                    <p>• 微博：超话运营 + 热搜投放 + 粉丝互动</p>
                    <p>• 小红书：种草笔记 + 探店打卡 + 周边营销</p>
                    
                    <p><strong>付费广告（预算占比25%）：</strong></p>
                    <p>• 信息流：腾讯/头条/百度精准投放</p>
                    <p>• 开屏广告：核心城市地铁/商圈大屏</p>
                    
                    <p><strong>内容营销（预算占比20%）：</strong></p>
                    <p>• KOL合作：头部10人 + 腰部50人 + 尾部200人</p>
                    <p>• 媒体公关：行业媒体专访 + 娱乐媒体报道</p>
                </div>

                <div class="chart-container">
                    <canvas id="budgetChart"></canvas>
                </div>

                <h2 class="section-title">💡 核心打法</h2>
                <div class="strategy-item">
                    <div class="strategy-title">打法1：话题营销引爆</div>
                    <p><strong>执行步骤：</strong></p>
                    <p>1. 提前7天预埋话题种子，KOL预热</p>
                    <p>2. 上线当天联动100+账号同步发布</p>
                    <p>3. 配合微博热搜，制造话题爆点</p>
                    <p><strong>预算分配：</strong>300万（KOL 200万 + 热搜 100万）</p>
                    <p><strong>预期ROI：</strong>话题阅读10亿+，ROI 1:15</p>
                </div>

                <div class="strategy-item">
                    <div class="strategy-title">打法2：短视频矩阵覆盖</div>
                    <p><strong>执行步骤：</strong></p>
                    <p>1. 制作30条不同角度的短视频素材</p>
                    <p>2. 投放抖音/快手信息流，精准触达目标人群</p>
                    <p>3. 激励UGC创作，发起挑战赛</p>
                    <p><strong>预算分配：</strong>500万（素材制作 100万 + 投放 400万）</p>
                    <p><strong>预期ROI：</strong>曝光30亿+，ROI 1:10</p>
                </div>

                <div class="strategy-item">
                    <div class="strategy-title">打法3：粉丝社群运营</div>
                    <p><strong>执行步骤：</strong></p>
                    <p>1. 建立核心粉丝群500个，覆盖10万核心用户</p>
                    <p>2. 每日发布独家物料，激发UGC二创</p>
                    <p>3. 组织线上线下互动活动，强化粉丝粘性</p>
                    <p><strong>预算分配：</strong>200万（物料+活动+奖励）</p>
                    <p><strong>预期ROI：</strong>自然传播曝光10亿+，ROI 1:20</p>
                </div>

                <h2 class="section-title">⏰ 执行时间表</h2>
                <div class="section-content">
                    <p><strong>T-60天：</strong>概念预热，KOL种草，话题铺垫</p>
                    <p><strong>T-30天：</strong>物料释放，预约冲刺，热搜布局</p>
                    <p><strong>T-7天：</strong>倒计时造势，粉丝互动，媒体预热</p>
                    <p><strong>T-Day：</strong>首播引爆，全渠道联动，数据监测</p>
                    <p><strong>T+7天：</strong>话题延续，口碑发酵，KPI优化</p>
                    <p><strong>T+30天：</strong>长尾运营，二次传播，ROI评估</p>
                </div>

                <h2 class="section-title">🎯 效果评估</h2>
                <div class="section-content">
                    <p><strong>核心指标：</strong></p>
                    <p>• 全网曝光量、话题阅读量、搜索指数</p>
                    <p>• 平台预约数、首播播放量、会员转化</p>
                    <p>• 微博超话讨论量、短视频播放量、UGC数量</p>
                    <p>• 营销ROI、获客成本、用户LTV</p>
                    
                    <p><strong>优化机制：</strong></p>
                    <p>• 每日数据复盘，实时调整投放策略</p>
                    <p>• A/B测试素材，优化转化路径</p>
                    <p>• 舆情监测预警，及时危机公关</p>
                </div>
            `;

            document.getElementById('resultContent').innerHTML = content;

            // 绘制预算分配饼图
            setTimeout(() => {
                const ctx = document.getElementById('budgetChart');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'pie',
                        data: {
                            labels: ['短视频', '社交媒体', '付费广告', '内容营销'],
                            datasets: [{
                                data: [30, 25, 25, 20],
                                backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#4facfe']
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                legend: { position: 'bottom' },
                                title: { display: true, text: '预算分配方案' }
                            }
                        }
                    });
                }
            }, 100);
        }

        // 保存历史记录
        function saveToHistory(plan) {
            let history = JSON.parse(localStorage.getItem('dramaHistory') || '[]');
            history.unshift(plan);
            if (history.length > 10) history = history.slice(0, 10);
            localStorage.setItem('dramaHistory', JSON.stringify(history));
            loadHistory();
        }

        // 加载历史记录
        function loadHistory() {
            const history = JSON.parse(localStorage.getItem('dramaHistory') || '[]');
            if (history.length > 0) {
                document.getElementById('historySection').style.display = 'block';
                const historyHTML = history.map((item, index) => `
                    <div class="history-item" onclick="loadHistoryItem(${index})">
                        <strong>${item.dramaName}</strong> - ${item.dramaType} - ${item.timestamp}
                    </div>
                `).join('');
                document.getElementById('historyList').innerHTML = historyHTML;
            }
        }

        // 加载历史记录项
        function loadHistoryItem(index) {
            const history = JSON.parse(localStorage.getItem('dramaHistory') || '[]');
            const item = history[index];
            document.getElementById('dramaName').value = item.dramaName;
            document.getElementById('dramaType').value = item.dramaType;
            document.getElementById('platform').value = item.platform;
            document.getElementById('budget').value = item.budget;
            document.getElementById('audience').value = item.audience;
            document.getElementById('stage').value = item.stage;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 导出Markdown
        function exportMarkdown() {
            const content = document.getElementById('resultContent').innerText;
            const blob = new Blob([content], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${document.getElementById('dramaName').value}_营销方案.md`;
            a.click();
        }

        // 打印
        function printPlan() {
            window.print();
        }

        // 分享
        function sharePlan() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: '剧集营销方案', url: url });
            } else {
                navigator.clipboard.writeText(url);
                alert('链接已复制到剪贴板！');
            }
        }

        // 页面加载时加载历史记录
        window.onload = loadHistory;
    </script>
</body>
</html>
